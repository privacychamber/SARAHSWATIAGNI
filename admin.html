<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarahswati Agni | CMS Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-dark: #070707;
            --color-gold: #d4af37;
            --color-bronze: #b67c3d;
            --color-cream: #f6f1e9;
            --glass-bg: rgba(20, 20, 20, 0.4);
            --glass-border: rgba(182, 124, 61, 0.15);
            --glass-glow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at center top, #1a1511 0%, var(--color-bg-dark) 100%);
            color: var(--color-cream); 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* Glassmorphism Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
        
        .header { text-align: center; margin-bottom: 3rem; position: relative; }
        .header h1 { font-size: 2.5rem; letter-spacing: 0.1em; font-weight: 300; }
        .text-gold { color: var(--color-gold); font-weight: 600; }
        
        /* Glass Cards */
        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
            padding: 2.5rem; 
            margin-bottom: 2rem; 
            box-shadow: var(--glass-glow);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(182, 124, 61, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        h2, h3 { margin-top: 0; color: var(--color-gold); letter-spacing: 0.05em; font-weight: 500; }
        
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: #8E8A84; }
        
        /* Premium Inputs */
        input[type="text"], input[type="password"], textarea { 
            width: 100%; 
            padding: 1rem; 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 8px; 
            background: rgba(0,0,0,0.3); 
            color: #fff; 
            font-family: inherit; 
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        
        input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
            outline: none;
            border-color: var(--color-bronze);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(182, 124, 61, 0.2);
        }
        
        textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
        
        /* Custom File Input */
        input[type="file"] {
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border: 1px dashed var(--color-bronze);
            border-radius: 8px;
            width: 100%;
            color: #8E8A84;
            cursor: pointer;
        }
        
        /* Glowing Buttons */
        .btn { 
            background: linear-gradient(135deg, var(--color-bronze) 0%, #875522 100%);
            color: #fff; 
            border: 1px solid var(--color-gold); 
            padding: 1rem 2rem; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s ease; 
            width: 100%; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
        }
        
        .btn:hover { 
            background: transparent;
            color: var(--color-gold);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }
        
        /* Sidebar Buttons */
        .btn-page { 
            background: rgba(0,0,0,0.4); 
            border: 1px solid transparent;
            margin-bottom: 0.8rem; 
            text-align: left; 
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: #8E8A84;
            box-shadow: none;
        }
        
        .btn-page:hover {
            background: rgba(182, 124, 61, 0.1);
            color: var(--color-cream);
            transform: translateX(5px);
            border-color: rgba(182, 124, 61, 0.3);
        }
        
        .btn-page.active { 
            background: var(--color-bronze); 
            color: #000;
            font-weight: 700;
            border-color: var(--color-gold);
        }
        
        .hidden { display: none !important; }
        
        #logoutBtn { 
            float: right; 
            background: transparent; 
            border-color: #d32f2f; 
            color: #d32f2f;
            width: auto; 
            padding: 0.5rem 1.5rem;
        }
        #logoutBtn:hover { 
            background: #d32f2f;
            color: #fff;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.4);
        }
        
        /* Alerts */
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; font-weight: 500; }
        .alert.success { background: rgba(76, 175, 80, 0.1); color: #4caf50; border: 1px solid #4caf50; display: block; }
        .alert.error { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid #f44336; display: block; }
        
        /* Grid System */
        .dashboard-layout { display: grid; grid-template-columns: 250px 1fr; gap: 3rem; }
        .modules-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
        
        @media (max-width: 768px) {
            .dashboard-layout, .modules-layout { grid-template-columns: 1fr; gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><span class="text-gold">SARAHSWATI</span> AGNI ADMIN</h1>
        </div>

        <!-- Login Form -->
        <div id="loginSection" class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>Admin Login</h2>
            <div id="loginAlert" class="alert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection" class="hidden">
            <button id="logoutBtn" class="btn">Logout</button>
            <h2 style="margin-bottom: 2rem;">CMS Dashboard</h2>
            
            <div id="dashboardAlert" class="alert"></div>

            <div class="dashboard-layout">
                <!-- Sidebar -->
                <div>
                    <h3>Pages</h3>
                    <div id="pageSelector"></div>
                </div>
                
                <!-- Editor Area -->
                <div>
                    <div class="card">
                        <h3 id="formTitle">Select a page to edit</h3>
                        <form id="dynamicContentForm">
                            <div id="dynamicFields"></div>
                            <button type="submit" class="btn hidden" id="saveContentBtn">Save Content</button>
                        </form>
                    </div>
                </div>
            </div>

            <hr style="border-color: rgba(182, 124, 61, 0.2); margin: 3rem 0;">
            
            <!-- Additional Modules -->
            <div class="modules-layout">
                <div class="card">
                    <h3>Add New Service</h3>
                    <form id="serviceForm">
                        <div class="form-group"><label>Service Title</label><input type="text" id="serviceTitle" required></div>
                        <div class="form-group"><label>Description</label><textarea id="serviceDesc" required></textarea></div>
                        <div class="form-group"><label>Icon Class (e.g., fas fa-magic)</label><input type="text" id="serviceIcon" required></div>
                        <div class="form-group"><label>Link URL</label><input type="text" id="serviceLink" required></div>
                        <button type="submit" class="btn">Add Service</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Add New Testimonial</h3>
                    <form id="testimonialForm">
                        <div class="form-group"><label>Author</label><input type="text" id="testAuthor" required></div>
                        <div class="form-group"><label>Role</label><input type="text" id="testRole" required></div>
                        <div class="form-group"><label>Text</label><textarea id="testText" required></textarea></div>
                        <button type="submit" class="btn">Add Testimonial</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginAlert = document.getElementById('loginAlert');
        const dashboardAlert = document.getElementById('dashboardAlert');
        
        let allContent = [];

        // Check login
        const token = localStorage.getItem('adminToken');
        if (token) showDashboard();

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    showDashboard();
                } else showAlert(loginAlert, data.error, 'error');
            } catch (err) {
                showAlert(loginAlert, 'Login failed.', 'error');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
        });

        function showDashboard() {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            loadAdminContent();
        }

        function showAlert(el, msg, type) {
            el.textContent = msg; el.className = 'alert ' + type;
            setTimeout(() => { el.className = 'alert'; el.style.display = 'none'; }, 3000);
        }

        // Load CMS Data
        async function loadAdminContent() {
            try {
                const res = await fetch('/api/admin/content', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') }
                });
                if (!res.ok) throw new Error('Unauthorized');
                allContent = await res.json();
                buildPageSelector();
            } catch (err) {
                localStorage.removeItem('adminToken');
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        }

        function buildPageSelector() {
            const pages = [...new Set(allContent.map(item => item.page))];
            const selector = document.getElementById('pageSelector');
            selector.innerHTML = '';
            pages.forEach((page, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-page';
                btn.textContent = page.toUpperCase();
                btn.onclick = () => {
                    document.querySelectorAll('.btn-page').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    buildFormForPage(page);
                };
                selector.appendChild(btn);
                if (index === 0) btn.click();
            });
        }

        function buildFormForPage(page) {
            document.getElementById('formTitle').textContent = `Editing: ${page.toUpperCase()}`;
            const fieldsContainer = document.getElementById('dynamicFields');
            fieldsContainer.innerHTML = '';
            
            const pageContent = allContent.filter(c => c.page === page);
            pageContent.forEach(item => {
                const div = document.createElement('div');
                div.className = 'form-group';
                
                const label = document.createElement('label');
                label.textContent = item.key.replace(page + '_', '').replace(/_/g, ' ');
                div.appendChild(label);
                
                if (item.type === 'textarea') {
                    const input = document.createElement('textarea');
                    input.id = item.key;
                    input.value = item.value;
                    div.appendChild(input);
                } else if (item.type === 'image') {
                    const preview = document.createElement('img');
                    preview.src = item.value;
                    preview.style.height = '100px';
                    preview.style.display = 'block';
                    preview.style.marginBottom = '10px';
                    preview.style.borderRadius = '4px';
                    div.appendChild(preview);
                    
                    const hiddenUrl = document.createElement('input');
                    hiddenUrl.type = 'hidden';
                    hiddenUrl.id = item.key;
                    hiddenUrl.value = item.value;
                    div.appendChild(hiddenUrl);

                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.accept = 'image/*';
                    fileInput.id = item.key + "_file";
                    div.appendChild(fileInput);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = item.key;
                    input.value = item.value;
                    div.appendChild(input);
                }
                
                fieldsContainer.appendChild(div);
            });
            
            document.getElementById('saveContentBtn').classList.remove('hidden');
            document.getElementById('dynamicContentForm').dataset.activePage = page;
        }

        // Save Content
        document.getElementById('dynamicContentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const page = e.target.dataset.activePage;
            const pageContent = allContent.filter(c => c.page === page);
            const token = localStorage.getItem('adminToken');
            
            try {
                for (let item of pageContent) {
                    let newValue;
                    if (item.type === 'image') {
                        const fileInput = document.getElementById(item.key + "_file");
                        if (fileInput.files.length > 0) {
                            showAlert(dashboardAlert, 'Uploading image...', 'success');
                            const formData = new FormData();
                            formData.append('image', fileInput.files[0]);
                            const uploadRes = await fetch('/api/upload', {
                                method: 'POST',
                                headers: { 'Authorization': 'Bearer ' + token },
                                body: formData
                            });
                            const uploadData = await uploadRes.json();
                            if(uploadData.error) throw new Error(uploadData.error);
                            newValue = uploadData.url;
                        } else {
                            newValue = document.getElementById(item.key).value;
                        }
                    } else {
                        newValue = document.getElementById(item.key).value;
                    }

                    if (newValue !== item.value) {
                        await fetch('/api/admin/content', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                            body: JSON.stringify({ key: item.key, value: newValue })
                        });
                        item.value = newValue; // update local cache
                    }
                }
                showAlert(dashboardAlert, `${page.toUpperCase()} content saved!`, 'success');
                buildFormForPage(page); // refresh to show new images
            } catch (err) {
                showAlert(dashboardAlert, err.message || 'Error saving content.', 'error');
            }
        });

        // Add Service/Testimonial unchanged from before
        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const serviceData = {
                title: document.getElementById('serviceTitle').value,
                description: document.getElementById('serviceDesc').value,
                icon: document.getElementById('serviceIcon').value,
                link: document.getElementById('serviceLink').value
            };
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch('/api/admin/services', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify(serviceData) });
                if (res.ok) { showAlert(dashboardAlert, 'Service added!', 'success'); e.target.reset(); }
            } catch (err) { showAlert(dashboardAlert, 'Error adding service.', 'error'); }
        });

        document.getElementById('testimonialForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const testData = {
                author: document.getElementById('testAuthor').value,
                role: document.getElementById('testRole').value,
                text: document.getElementById('testText').value
            };
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch('/api/admin/testimonials', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify(testData) });
                if (res.ok) { showAlert(dashboardAlert, 'Testimonial added!', 'success'); e.target.reset(); }
            } catch (err) { showAlert(dashboardAlert, 'Error adding testimonial.', 'error'); }
        });
    </script>
</body>
</html>
