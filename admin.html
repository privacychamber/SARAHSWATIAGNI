<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarah Agni | CMS Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        .header { text-align: center; margin-bottom: 2rem; }
        .text-gold { color: #b67c3d; }
        .card { background-color: #1e1e1e; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; text-transform: capitalize; color: #aaa; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #333; border-radius: 4px; background-color: #2a2a2a; color: #fff; font-family: inherit; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 120px; }
        .btn { background-color: #b67c3d; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.3s; width: 100%; }
        .btn:hover { background-color: #9c6730; }
        .btn-page { background-color: #2a2a2a; margin-bottom: 0.5rem; text-align: left; }
        .btn-page:hover, .btn-page.active { background-color: #b67c3d; }
        .hidden { display: none !important; }
        #logoutBtn { float: right; background-color: #d32f2f; width: auto; }
        #logoutBtn:hover { background-color: #b71c1c; }
        .alert { padding: 1rem; border-radius: 4px; margin-bottom: 1rem; display: none; }
        .alert.success { background-color: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid #4caf50; display: block; }
        .alert.error { background-color: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><span class="text-gold">SARAH</span> AGNI ADMIN</h1>
        </div>

        <!-- Login Form -->
        <div id="loginSection" class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>Admin Login</h2>
            <div id="loginAlert" class="alert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection" class="hidden">
            <button id="logoutBtn" class="btn">Logout</button>
            <h2 style="margin-bottom: 2rem;">CMS Dashboard</h2>
            
            <div id="dashboardAlert" class="alert"></div>

            <div style="display: flex; gap: 2rem;">
                <!-- Sidebar -->
                <div style="flex: 1;">
                    <h3>Pages</h3>
                    <div id="pageSelector"></div>
                </div>
                
                <!-- Editor Area -->
                <div style="flex: 3;">
                    <div class="card">
                        <h3 id="formTitle">Select a page to edit</h3>
                        <form id="dynamicContentForm">
                            <div id="dynamicFields"></div>
                            <button type="submit" class="btn hidden" id="saveContentBtn">Save Content</button>
                        </form>
                    </div>
                </div>
            </div>

            <hr style="border-color: #333; margin: 2rem 0;">
            
            <!-- Additional Modules -->
            <div style="display: flex; gap: 2rem;">
                <div class="card" style="flex: 1;">
                    <h3>Add New Service</h3>
                    <form id="serviceForm">
                        <div class="form-group"><label>Service Title</label><input type="text" id="serviceTitle" required></div>
                        <div class="form-group"><label>Description</label><textarea id="serviceDesc" required></textarea></div>
                        <div class="form-group"><label>Icon Class (e.g., fas fa-magic)</label><input type="text" id="serviceIcon" required></div>
                        <div class="form-group"><label>Link URL</label><input type="text" id="serviceLink" required></div>
                        <button type="submit" class="btn">Add Service</button>
                    </form>
                </div>

                <div class="card" style="flex: 1;">
                    <h3>Add New Testimonial</h3>
                    <form id="testimonialForm">
                        <div class="form-group"><label>Author</label><input type="text" id="testAuthor" required></div>
                        <div class="form-group"><label>Role</label><input type="text" id="testRole" required></div>
                        <div class="form-group"><label>Text</label><textarea id="testText" required></textarea></div>
                        <button type="submit" class="btn">Add Testimonial</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const loginAlert = document.getElementById('loginAlert');
        const dashboardAlert = document.getElementById('dashboardAlert');
        
        let allContent = [];

        // Check login
        const token = localStorage.getItem('adminToken');
        if (token) showDashboard();

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    showDashboard();
                } else showAlert(loginAlert, data.error, 'error');
            } catch (err) {
                showAlert(loginAlert, 'Login failed.', 'error');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
        });

        function showDashboard() {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            loadAdminContent();
        }

        function showAlert(el, msg, type) {
            el.textContent = msg; el.className = 'alert ' + type;
            setTimeout(() => { el.className = 'alert'; el.style.display = 'none'; }, 3000);
        }

        // Load CMS Data
        async function loadAdminContent() {
            try {
                const res = await fetch('/api/admin/content', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') }
                });
                if (!res.ok) throw new Error('Unauthorized');
                allContent = await res.json();
                buildPageSelector();
            } catch (err) {
                localStorage.removeItem('adminToken');
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        }

        function buildPageSelector() {
            const pages = [...new Set(allContent.map(item => item.page))];
            const selector = document.getElementById('pageSelector');
            selector.innerHTML = '';
            pages.forEach((page, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-page';
                btn.textContent = page.toUpperCase();
                btn.onclick = () => {
                    document.querySelectorAll('.btn-page').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    buildFormForPage(page);
                };
                selector.appendChild(btn);
                if (index === 0) btn.click();
            });
        }

        function buildFormForPage(page) {
            document.getElementById('formTitle').textContent = `Editing: ${page.toUpperCase()}`;
            const fieldsContainer = document.getElementById('dynamicFields');
            fieldsContainer.innerHTML = '';
            
            const pageContent = allContent.filter(c => c.page === page);
            pageContent.forEach(item => {
                const div = document.createElement('div');
                div.className = 'form-group';
                
                const label = document.createElement('label');
                label.textContent = item.key.replace(page + '_', '').replace(/_/g, ' ');
                div.appendChild(label);
                
                let input;
                if (item.type === 'textarea') {
                    input = document.createElement('textarea');
                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                }
                input.id = item.key;
                input.value = item.value;
                div.appendChild(input);
                
                fieldsContainer.appendChild(div);
            });
            
            document.getElementById('saveContentBtn').classList.remove('hidden');
            document.getElementById('dynamicContentForm').dataset.activePage = page;
        }

        // Save Content
        document.getElementById('dynamicContentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const page = e.target.dataset.activePage;
            const pageContent = allContent.filter(c => c.page === page);
            const token = localStorage.getItem('adminToken');
            
            try {
                for (let item of pageContent) {
                    const newValue = document.getElementById(item.key).value;
                    if (newValue !== item.value) {
                        await fetch('/api/admin/content', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                            body: JSON.stringify({ key: item.key, value: newValue })
                        });
                        item.value = newValue; // update local cache
                    }
                }
                showAlert(dashboardAlert, `${page.toUpperCase()} content saved!`, 'success');
            } catch (err) {
                showAlert(dashboardAlert, 'Error saving content.', 'error');
            }
        });

        // Add Service/Testimonial unchanged from before
        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const serviceData = {
                title: document.getElementById('serviceTitle').value,
                description: document.getElementById('serviceDesc').value,
                icon: document.getElementById('serviceIcon').value,
                link: document.getElementById('serviceLink').value
            };
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch('/api/admin/services', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify(serviceData) });
                if (res.ok) { showAlert(dashboardAlert, 'Service added!', 'success'); e.target.reset(); }
            } catch (err) { showAlert(dashboardAlert, 'Error adding service.', 'error'); }
        });

        document.getElementById('testimonialForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const testData = {
                author: document.getElementById('testAuthor').value,
                role: document.getElementById('testRole').value,
                text: document.getElementById('testText').value
            };
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch('/api/admin/testimonials', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify(testData) });
                if (res.ok) { showAlert(dashboardAlert, 'Testimonial added!', 'success'); e.target.reset(); }
            } catch (err) { showAlert(dashboardAlert, 'Error adding testimonial.', 'error'); }
        });
    </script>
</body>
</html>
